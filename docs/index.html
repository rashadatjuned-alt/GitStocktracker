<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Tracker Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0d0d; --bg2:#161616; --bg3:#1e1e1e; --bg4:#262626;
      --border:#2a2a2a; --border2:#333; --text:#e8e8e8; --muted:#777; --muted2:#555;
      --green:#4ade80; --green-bg:#0a2016; --green-bd:#1a4a2e;
      --red:#f87171; --red-bg:#200a0a; --red-bd:#4a1a1a;
      --yellow:#fbbf24; --yellow-bg:#1e1500;
      --blue:#60a5fa; --radius:12px; --radius-sm:8px;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    }
    body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
 
    /* Loading */
    #loading { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:100; }
    #loading .spinner { width:24px; height:24px; border:2px solid var(--muted); border-top-color:transparent; border-radius:50%; animation:spin .65s linear infinite; }
    #loading p { color:var(--muted); font-size:14px; }
    #loading.hidden { display:none; }
 
    /* Setup */
    #setup-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .setup-card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:420px; }
    .setup-card .logo { font-size:32px; margin-bottom:16px; }
    .setup-card h1 { font-size:22px; font-weight:600; margin-bottom:6px; }
    .setup-card .sub { color:var(--muted); font-size:14px; margin-bottom:28px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    .field input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); color:var(--text); font-size:14px; height:42px; padding:0 14px; outline:none; font-family:var(--font); }
    .field input:focus { border-color:#555; }
    .field input::placeholder { color:var(--muted2); }
    .field-hint { font-size:12px; color:var(--muted); margin-top:5px; }
    .field-hint a { color:var(--blue); text-decoration:none; }
    .setup-err { color:var(--red); font-size:13px; margin-bottom:12px; display:none; }
 
    /* App */
    #app { display:none; }
    .topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .topbar-left h1 { font-size:16px; font-weight:600; }
    .live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .repo-tag { font-size:12px; color:var(--muted); background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:3px 10px; }
 
    .main { max-width:900px; margin:0 auto; padding:32px 20px; }
 
    /* Stats */
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:28px; }
    .stat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
    .stat-val { font-size:30px; font-weight:600; line-height:1; margin-bottom:5px; }
    .stat-lbl { font-size:12px; color:var(--muted); }
 
    /* Add card */
    .add-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; margin-bottom:24px; }
    .add-card h2 { font-size:13px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px; }
    .add-row { display:flex; gap:8px; flex-wrap:wrap; }
    .add-row input { background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); color:var(--text); font-size:14px; height:40px; padding:0 14px; outline:none; font-family:var(--font); }
    .add-row input:focus { border-color:#555; }
    .add-row input::placeholder { color:var(--muted2); }
    .inp-url { flex:1; min-width:240px; }
    .inp-name { width:180px; }
 
    /* Buttons */
    button { border:none; border-radius:var(--radius-sm); cursor:pointer; font-family:var(--font); font-size:14px; font-weight:500; height:40px; padding:0 18px; transition:opacity .15s,background .15s; white-space:nowrap; }
    button:disabled { opacity:.4; cursor:not-allowed; }
    .btn-primary { background:#e8e8e8; color:#111; }
    .btn-primary:hover:not(:disabled) { background:#fff; }
    .btn-secondary { background:var(--bg3); color:var(--text); border:1px solid var(--border2); }
    .btn-secondary:hover:not(:disabled) { background:var(--bg4); }
    .btn-sm { font-size:12px; height:32px; padding:0 12px; }
    .btn-del { background:var(--red-bg); color:var(--red); border:1px solid var(--red-bd); }
    .btn-del:hover:not(:disabled) { background:#2d0a0a; }
    .btn-check { background:linear-gradient(135deg,#1a4a2e,#276749); color:var(--green); border:1px solid var(--green-bd); }
    .btn-check:hover:not(:disabled) { background:linear-gradient(135deg,#1f5c38,#2d7a52); }
 
    /* Cards */
    #items { display:flex; flex-direction:column; gap:10px; }
    .empty { text-align:center; padding:64px 20px; color:var(--muted); font-size:14px; border:1px dashed var(--border2); border-radius:var(--radius); }
    .empty-icon { font-size:36px; display:block; margin-bottom:14px; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; transition:border-color .2s; }
    .card:hover { border-color:var(--border2); }
    .card-top { display:flex; align-items:flex-start; gap:14px; }
    .card-icon { font-size:22px; flex-shrink:0; margin-top:1px; }
    .card-info { flex:1; min-width:0; }
    .card-name { font-size:15px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-url { font-size:12px; color:var(--muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-url a { color:inherit; text-decoration:none; }
    .card-url a:hover { color:var(--blue); }
    .badge { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:500; padding:4px 11px; border-radius:999px; }
    .badge-out { background:var(--red-bg); color:var(--red); border:1px solid var(--red-bd); }
    .badge-in { background:var(--green-bg); color:var(--green); border:1px solid var(--green-bd); }
    .badge-err { background:var(--yellow-bg); color:var(--yellow); border:1px solid #4a3500; }
    .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
    .dot-out { background:var(--red); }
    .dot-in { background:var(--green); box-shadow:0 0 5px var(--green); }
    .card-meta { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .card-meta-left { display:flex; align-items:center; gap:10px; }
    .meta-text { font-size:12px; color:var(--muted); }
    .meta-text b { color:#999; }
    .platform-pill { font-size:11px; color:var(--muted); background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:1px 7px; }
    .spinner { display:inline-block; width:11px; height:11px; border:1.5px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin .65s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
 
<div id="loading"><span class="spinner"></span><p>Loading...</p></div>
 
<div id="setup-screen" style="display:none;">
  <div class="setup-card">
    <div class="logo">📦</div>
    <h1>Stock Tracker</h1>
    <p class="sub">Connect your GitHub repo</p>
    <div class="field">
      <label>GitHub Username</label>
      <input type="text" id="s-owner" placeholder="your-username" />
    </div>
    <div class="field">
      <label>Repository Name</label>
      <input type="text" id="s-repo" placeholder="GitStocktracker" />
    </div>
    <div class="field">
      <label>Access Token</label>
      <input type="password" id="s-token" placeholder="ghp_xxxxxxxxxxxx" />
    </div>
    <p class="setup-err" id="setup-err"></p>
    <button class="btn-primary" style="width:100%;" onclick="connect()">Connect</button>
  </div>
</div>
 
<div id="app">
  <div class="topbar">
    <div class="topbar-left"><span class="live-dot"></span><h1>Stock Tracker</h1></div>
    <div class="topbar-right"><span class="repo-tag" id="repo-tag"></span><button class="btn-secondary btn-sm" onclick="signOut()">Sign out</button></div>
  </div>
 
  <div class="main">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Tracking</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--red)" id="s-out">—</div><div class="stat-lbl">Out of stock</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--green)" id="s-in">—</div><div class="stat-lbl">In stock</div></div>
    </div>
 
    <div class="add-card">
      <div class="add-row">
        <input class="inp-name" type="text" id="i-name" placeholder="Name" />
        <input class="inp-url" type="url" id="i-url" placeholder="URL" />
        <button class="btn-primary" id="btn-add" onclick="addProduct()">+ Track</button>
      </div>
    </div>
 
    <div class="toolbar">
      <div id="items-label">Tracked products</div>
      <div class="toolbar-right">
        <button class="btn-secondary btn-sm" id="btn-refresh" onclick="loadProducts()">↻ Refresh</button>
        <button class="btn-check btn-sm" id="btn-check-now" onclick="checkNow()">▶ Check Now</button>
      </div>
    </div>
 
    <div id="items"></div>
    <div class="last-run" id="last-run"></div>
  </div>
</div>
 
<div id="toast"></div>
 
<script>
let CFG = {};
const LS_KEY = 'st-cfg-v2';
const GH = 'https://api.github.com';
 
function loadCfg() { try { CFG = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { CFG = {}; } }
function saveCfg() { localStorage.setItem(LS_KEY, JSON.stringify(CFG)); }
 
async function ghFetch(path, opts = {}) {
  const r = await fetch(`${GH}${path}`, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${CFG.token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers || {})
    }
  });
  if (!r.ok) throw new Error(`GitHub error ${r.status}`);
  return r.status === 204 ? null : r.json();
}
 
async function getProductsFile() {
  const data = await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/products.json`);
  const content = JSON.parse(atob(data.content.replace(/\n/g, '')));
  return { content, sha: data.sha };
}
 
async function saveProductsFile(content, sha) {
  const body = JSON.stringify(content, null, 2);
  await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/products.json`, {
    method: 'PUT',
    body: JSON.stringify({
      message: 'update products [skip ci]',
      content: btoa(unescape(encodeURIComponent(body))),
      sha
    })
  });
}
 
async function triggerWorkflow() {
  await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/actions/workflows/check-stock.yml/dispatches`, {
    method: 'POST',
    body: JSON.stringify({ ref: 'main' })
  });
}
 
async function connect() {
  const owner = document.getElementById('s-owner').value.trim();
  const repo = document.getElementById('s-repo').value.trim();
  const token = document.getElementById('s-token').value.trim();
  try {
    CFG = { owner, repo, token };
    await ghFetch(`/repos/${owner}/${repo}/contents/data/products.json`);
    saveCfg();
    showApp();
  } catch (e) { document.getElementById('setup-err').textContent = 'Connection failed'; }
}
 
function signOut() { localStorage.removeItem(LS_KEY); location.reload(); }
 
function showApp() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('repo-tag').textContent = `${CFG.owner}/${CFG.repo}`;
  loadProducts();
}
 
let products = [];
let currentSha = null;
 
async function loadProducts() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  try {
    const { content, sha } = await getProductsFile();
    currentSha = sha;
    const rawProds = content || [];

    let liveState = {};
    try {
      const stateData = await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/state.json`);
      liveState = JSON.parse(atob(stateData.content.replace(/\n/g, '')));
    } catch (e) { console.warn('No state file'); }

    products = rawProds.map(p => {
      const s = liveState[p.id] || {};
      return { ...p, ...s };
    });

    render();
    loadLastRun();
  } catch (e) { toast('Load failed', 'error'); } finally { btn.disabled = false; }
}
 
function render() {
  document.getElementById('s-total').textContent = products.length;
  document.getElementById('s-out').textContent = products.filter(p => p.status === 'out').length;
  document.getElementById('s-in').textContent = products.filter(p => p.status === 'in').length;
  
  const el = document.getElementById('items');
  el.innerHTML = products.map(p => `
    <div class="card">
      <div class="card-top">
        <div class="card-icon">${p.status === 'in' ? '✅' : '🔴'}</div>
        <div class="card-info">
          <div class="card-name">${p.name}</div>
          <div class="card-url"><a href="${p.url}" target="_blank">${p.url}</a></div>
        </div>
        <div class="badge ${p.status === 'in' ? 'badge-in' : 'badge-out'}">${p.status === 'in' ? 'In Stock' : 'Out'}</div>
      </div>
      <div class="card-meta">
        <span class="meta-text">Last: ${p.lastChecked ? new Date(p.lastChecked).toLocaleString() : 'Pending'}</span>
        <button class="btn-del btn-sm" onclick="removeProduct('${p.id}')">Remove</button>
      </div>
    </div>`).join('');
}
 
async function addProduct() {
  const url = document.getElementById('i-url').value.trim();
  const name = document.getElementById('i-name').value.trim();
  if(!url) return;
  const newProd = { id: Date.now().toString(), url, name: name || 'Product', status: 'out' };
  try {
    await saveProductsFile([...products.map(p => ({id:p.id, url:p.url, name:p.name})), newProd], currentSha);
    toast('Added');
    loadProducts();
  } catch (e) { toast('Add failed', 'error'); }
}
 
async function removeProduct(id) {
  try {
    await saveProductsFile(products.filter(p => p.id !== id).map(p => ({id:p.id, url:p.url, name:p.name})), currentSha);
    loadProducts();
  } catch (e) { toast('Remove failed', 'error'); }
}
 
async function checkNow() {
  try { await triggerWorkflow(); toast('Started'); } catch (e) { toast('Trigger failed', 'error'); }
}
 
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  setTimeout(() => el.className = '', 3000);
}
 
loadCfg();
if (CFG.token) showApp(); else document.getElementById('loading').classList.add('hidden'), document.getElementById('setup-screen').style.display = 'flex';
</script>
</body>
</html>
