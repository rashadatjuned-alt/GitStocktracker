<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Tracker Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0d0d; --bg2:#161616; --bg3:#1e1e1e; --bg4:#262626;
      --border:#2a2a2a; --border2:#333; --text:#e8e8e8; --muted:#777; --muted2:#555;
      --green:#4ade80; --green-bg:#0a2016; --green-bd:#1a4a2e;
      --red:#f87171; --red-bg:#200a0a; --red-bd:#4a1a1a;
      --blue:#60a5fa; --radius:12px; --radius-sm:8px;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    }
    body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; overflow-x: hidden; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1; transform: scale(1);} 50%{opacity:.5; transform: scale(1.05);} }

    #loading { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; transition: 0.5s; }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #app { display:none; animation: fadeIn 0.6s ease-out; }
    
    .topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }

    .main { max-width:900px; margin:0 auto; padding:32px 20px; }
    
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:28px; }
    .stat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; transition: 0.3s; }
    .stat-val { font-size:30px; font-weight:600; line-height:1; margin-bottom:5px; }
    .stat-lbl { font-size:12px; color:var(--muted); }

    .add-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; margin-bottom:24px; }
    .add-row { display:flex; gap:10px; flex-wrap:wrap; }
    .add-row input { background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); color:var(--text); font-size:14px; height:44px; padding:0 14px; flex:1; outline:none; }

    button { border:none; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; height:40px; padding:0 18px; transition: all 0.2s; position: relative; overflow: hidden; }
    button:active { transform: scale(0.96); }
    .btn-primary { background:#e8e8e8; color:#111; }
    .btn-primary:hover { background:#fff; }
    .btn-secondary { background:var(--bg3); color:var(--text); border:1px solid var(--border2); }
    .btn-check { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
    .btn-check:hover { background: var(--green-bd); color: white; }
    .btn-del { background:var(--red-bg); color:var(--red); border:1px solid var(--red-bd); }

    .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px 22px; margin-bottom:12px; transition: 0.3s; }
    .card:hover { border-color: var(--muted2); }
    .card-top { display:flex; align-items:flex-start; gap:16px; }
    .card-info { flex:1; min-width:0; }
    .card-name { font-size:16px; font-weight:600; }
    .card-url { font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top: 4px; }
    
    .badge { font-size:11px; padding:4px 10px; border-radius:999px; font-weight:700; text-transform: uppercase; }
    .badge-in { background:var(--green-bg); color:var(--green); border:1px solid var(--green-bd); animation: pulse 2s infinite; }
    .badge-out { background:var(--red-bg); color:var(--red); border:1px solid var(--red-bd); }

    .card-meta { margin-top:16px; padding-top:14px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    
    .loading-spinner { display: none; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
    .is-loading .loading-spinner { display: inline-block; }
    .is-loading span { opacity: 0.5; }

    #toast { position:fixed; bottom:24px; left:50%; transform:translate(-50%, 100px); background:var(--bg2); border:1px solid var(--border2); border-radius:12px; padding:14px 24px; transition: 0.4s; z-index:999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #toast.show { transform:translate(-50%, 0); }
  </style>
</head>
<body>

<div id="loading"><div style="width:24px;height:24px;border:2px solid #777;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;"></div></div>

<div id="setup-screen" style="display:none;">
  <div class="setup-card" style="max-width:400px;background:var(--bg2);padding:40px;border-radius:16px;margin:100px auto;border:1px solid var(--border);">
    <h2 style="margin-bottom:20px;text-align:center;">Connect Dashboard</h2>
    <div style="margin-bottom:15px;"><label style="font-size:12px;color:var(--muted)">Username</label><input style="width:100%;height:40px;background:var(--bg3);border:1px solid var(--border2);color:#fff;padding:0 10px;" type="text" id="s-owner" value="rashadatjuned-alt"></div>
    <div style="margin-bottom:15px;"><label style="font-size:12px;color:var(--muted)">Repo</label><input style="width:100%;height:40px;background:var(--bg3);border:1px solid var(--border2);color:#fff;padding:0 10px;" type="text" id="s-repo" value="GitStocktracker"></div>
    <div style="margin-bottom:15px;"><label style="font-size:12px;color:var(--muted)">GitHub Token</label><input style="width:100%;height:40px;background:var(--bg3);border:1px solid var(--border2);color:#fff;padding:0 10px;" type="password" id="s-token"></div>
    <button class="btn-primary" style="width:100%" onclick="connect()">Connect Dashboard</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;padding-left:20px;"><span class="live-dot"></span><b style="font-size:18px;">Live Tracker</b></div>
    <div style="display:flex;gap:8px;margin-right:20px;">
        <button class="btn-check" id="btn-check-now" onclick="triggerManualCheck()">
            <div class="loading-spinner"></div><span>Check Now</span>
        </button>
        <button class="btn-secondary" id="btn-refresh" onclick="loadProducts()">
            <div class="loading-spinner"></div><span>Refresh</span>
        </button>
        <button class="btn-secondary" onclick="signOut()">Sign Out</button>
    </div>
  </div>
  <div class="main">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Tracking</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--red)" id="s-out">0</div><div class="stat-lbl">Out of Stock</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--green)" id="s-in">0</div><div class="stat-lbl">In Stock</div></div>
    </div>
    <div class="add-card">
      <div class="add-row">
        <input type="text" id="i-name" placeholder="Name (optional)">
        <input type="text" id="i-url" placeholder="URL Link">
        <button class="btn-primary" id="btn-add" onclick="addProduct()">
            <div class="loading-spinner"></div><span>+ Track</span>
        </button>
      </div>
    </div>
    <div id="items"></div>
  </div>
</div>

<div id="toast"></div>

<script>
let CFG = {};
let products = [];
let currentSha = null;
const LS_KEY = 'st-cfg-v2';

function loadCfg() { try { CFG = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e) { CFG = {}; } }
function saveCfg() { localStorage.setItem(LS_KEY, JSON.stringify(CFG)); }

async function ghFetch(path, opts = {}) {
  const r = await fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: { 'Authorization': `Bearer ${CFG.token}`, 'Accept': 'application/vnd.github+json', ...(opts.headers || {}) }
  });
  if (!r.ok) throw new Error('GH Error');
  return r.status === 204 ? null : r.json();
}

// ── Refresh Function (With Cache Buster) ─────────────────────────────────────
async function loadProducts() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('is-loading');
  try {
    const file = await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/products.json`);
    currentSha = file.sha;
    const raw = JSON.parse(atob(file.content));
    const rawList = raw.products || raw || [];
    
    let state = {};
    try {
      // ?t= avoids GitHub API caching old status
      const sFile = await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/state.json?t=${Date.now()}`);
      state = JSON.parse(atob(sFile.content));
    } catch(e){}

    products = rawList.map(p => ({ ...p, ...(state[p.id] || {}) }));
    render();
  } catch(e) { toast('Refresh failed','red'); }
  finally { btn.classList.remove('is-loading'); }
}

function render() {
  document.getElementById('s-total').textContent = products.length;
  document.getElementById('s-in').textContent = products.filter(p => p.status === 'in').length;
  document.getElementById('s-out').textContent = products.filter(p => p.status !== 'in').length;
  
  document.getElementById('items').innerHTML = products.map(p => `
    <div class="card" style="animation: fadeIn 0.4s ease-out">
      <div class="card-top">
        <div class="card-info">
          <div class="card-name" style="color:#fff;">${p.name}</div>
          <div class="card-url"><a href="${p.url}" target="_blank" style="color:inherit;text-decoration:none;">${p.url}</a></div>
        </div>
        <div class="badge ${p.status === 'in' ? 'badge-in' : 'badge-out'}">${p.status === 'in' ? '● IN STOCK' : '● OUT'}</div>
      </div>
      <div class="card-meta">
        <span style="font-size:12px;color:#777">Platform: ${p.platform || 'Auto'} · Last Checked: ${p.lastChecked ? new Date(p.lastChecked).toLocaleTimeString() : 'Pending'}</span>
        <button class="btn-del" style="height:32px;padding:0 12px;font-size:12px" onclick="removeProduct('${p.id}', this)">
            <div class="loading-spinner"></div><span>Remove</span>
        </button>
      </div>
    </div>`).join('');
}

// ── Manual Check Function (With Auto-Refresh) ────────────────────────────────
async function triggerManualCheck() {
  const btn = document.getElementById('btn-check-now');
  if (btn.classList.contains('is-loading')) return;

  btn.classList.add('is-loading');
  btn.querySelector('span').textContent = 'Running...';
  
  try {
    await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/actions/workflows/check-stock.yml/dispatches`, {
      method: 'POST',
      body: JSON.stringify({ ref: 'main' })
    });
    
    toast('Scan started! Fetching results in 50s...');
    
    // Auto-refresh after bot finishes rebase and push
    setTimeout(async () => {
      await loadProducts();
      toast('Status Updated ✅');
      btn.classList.remove('is-loading');
      btn.querySelector('span').textContent = 'Check Now';
    }, 50000); 

  } catch(e) { 
    toast('Trigger failed','red'); 
    btn.classList.remove('is-loading');
    btn.querySelector('span').textContent = 'Check Now';
  }
}

async function addProduct() {
  const name = document.getElementById('i-name').value;
  const url = document.getElementById('i-url').value;
  const btn = document.getElementById('btn-add');
  if(!url) return toast('Paste a URL first','red');
  
  btn.classList.add('is-loading');
  const newP = { id: Date.now().toString(), name: name || 'Item', url };
  const newList = products.map(p => ({ id: p.id, name: p.name, url: p.url }));

  try {
    await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/products.json`, {
      method: 'PUT',
      body: JSON.stringify({ message: 'add item', content: btoa(JSON.stringify({products: [...newList, newP]}, null, 2)), sha: currentSha })
    });
    toast('Link Saved!');
    document.getElementById('i-url').value = '';
    document.getElementById('i-name').value = '';
    setTimeout(loadProducts, 2000);
  } catch(e) { toast('Save Error','red'); }
  finally { btn.classList.remove('is-loading'); }
}

async function removeProduct(id, btn) {
  if(!confirm('Stop tracking this item?')) return;
  btn.classList.add('is-loading');
  const newList = products.filter(p => p.id !== id).map(p => ({ id: p.id, name: p.name, url: p.url }));
  try {
    await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/products.json`, {
      method: 'PUT',
      body: JSON.stringify({ message: 'remove item', content: btoa(JSON.stringify({products: newList}, null, 2)), sha: currentSha })
    });
    toast('Item Removed');
    setTimeout(loadProducts, 2000);
  } catch(e) { toast('Delete Error','red'); }
  finally { btn.classList.remove('is-loading'); }
}

function connect() {
  CFG = { owner: document.getElementById('s-owner').value, repo: document.getElementById('s-repo').value, token: document.getElementById('s-token').value };
  saveCfg();
  location.reload();
}

function signOut() { localStorage.removeItem(LS_KEY); location.reload(); }

function toast(m, c='') {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.color = c === 'red' ? '#f87171' : '#4ade80';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadCfg();
setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
if(CFG.token) { document.getElementById('app').style.display='block'; loadProducts(); }
else { document.getElementById('setup-screen').style.display='flex'; }
</script>
</body>
</html>
