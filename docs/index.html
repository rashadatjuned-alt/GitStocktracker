<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Tracker Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0d0d; --bg2:#161616; --bg3:#1e1e1e; --bg4:#262626;
      --border:#2a2a2a; --border2:#333; --text:#e8e8e8; --muted:#777; --muted2:#555;
      --green:#4ade80; --green-bg:#0a2016; --green-bd:#1a4a2e;
      --red:#f87171; --red-bg:#200a0a; --red-bd:#4a1a1a;
      --yellow:#fbbf24; --yellow-bg:#1e1500;
      --blue:#60a5fa; --radius:12px; --radius-sm:8px;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    }
    body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
    #loading { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:100; }
    #loading.hidden { display:none; }
    #setup-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .setup-card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:420px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    .field input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); color:var(--text); font-size:14px; height:42px; padding:0 14px; outline:none; }
    #app { display:none; }
    .topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
    .live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .main { max-width:900px; margin:0 auto; padding:32px 20px; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:28px; }
    .stat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
    .stat-val { font-size:30px; font-weight:600; line-height:1; margin-bottom:5px; }
    .stat-lbl { font-size:12px; color:var(--muted); }
    .add-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; margin-bottom:24px; }
    .add-row { display:flex; gap:8px; flex-wrap:wrap; }
    .add-row input { background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); color:var(--text); font-size:14px; height:40px; padding:0 14px; flex:1; outline:none; }
    button { border:none; border-radius:var(--radius-sm); cursor:pointer; font-weight:500; height:40px; padding:0 18px; transition: opacity .15s; }
    .btn-primary { background:#e8e8e8; color:#111; }
    .btn-secondary { background:var(--bg3); color:var(--text); border:1px solid var(--border2); }
    .btn-del { background:var(--red-bg); color:var(--red); border:1px solid var(--red-bd); }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; margin-bottom:10px; }
    .card-top { display:flex; align-items:flex-start; gap:14px; }
    .card-info { flex:1; min-width:0; }
    .card-name { font-size:15px; font-weight:500; }
    .card-url { font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .badge { font-size:12px; padding:4px 11px; border-radius:999px; font-weight:500; }
    .badge-in { background:var(--green-bg); color:var(--green); border:1px solid var(--green-bd); }
    .badge-out { background:var(--red-bg); color:var(--red); border:1px solid var(--red-bd); }
    .card-meta { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    #toast { position:fixed; bottom:24px; right:24px; background:var(--bg2); border:1px solid var(--border2); border-radius:10px; padding:12px 20px; transform:translateY(100px); transition: 0.3s; z-index:999; }
    #toast.show { transform:translateY(0); }
    .spinner { width:16px; height:16px; border:2px solid #777; border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div id="setup-screen" style="display:none;">
  <div class="setup-card">
    <h1>Connect Repo</h1>
    <div class="field"><label>Username</label><input type="text" id="s-owner" placeholder="rashadatjuned-alt"></div>
    <div class="field"><label>Repo</label><input type="text" id="s-repo" placeholder="GitStocktracker"></div>
    <div class="field"><label>Token</label><input type="password" id="s-token"></div>
    <button class="btn-primary" style="width:100%" onclick="connect()">Connect</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;padding-left:20px;"><span class="live-dot"></span><b>Stock Tracker</b></div>
    <button class="btn-secondary" style="margin-right:20px;" onclick="signOut()">Sign Out</button>
  </div>
  <div class="main">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Tracking</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--red)" id="s-out">0</div><div class="stat-lbl">Out</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--green)" id="s-in">0</div><div class="stat-lbl">In Stock</div></div>
    </div>
    <div class="add-card">
      <div class="add-row">
        <input type="text" id="i-name" placeholder="Item Name">
        <input type="text" id="i-url" placeholder="URL">
        <button class="btn-primary" onclick="addProduct()">+ Track</button>
      </div>
    </div>
    <div id="items"></div>
  </div>
</div>

<div id="toast"></div>

<script>
let CFG = {};
let products = [];
let currentSha = null;
const LS_KEY = 'st-cfg-v2';

function loadCfg() { CFG = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
function saveCfg() { localStorage.setItem(LS_KEY, JSON.stringify(CFG)); }

async function ghFetch(path, opts = {}) {
  const r = await fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: { 'Authorization': `Bearer ${CFG.token}`, 'Accept': 'application/vnd.github+json', ...(opts.headers || {}) }
  });
  if (!r.ok) throw new Error('GH Error');
  return r.status === 204 ? null : r.json();
}

async function loadProducts() {
  try {
    const file = await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/products.json`);
    currentSha = file.sha;
    const raw = JSON.parse(atob(file.content));
    
    let state = {};
    try {
      const sFile = await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/state.json`);
      state = JSON.parse(atob(sFile.content));
    } catch(e){}

    products = (raw.products || raw || []).map(p => ({ ...p, ...(state[p.id] || {}) }));
    render();
  } catch(e) { toast('Load failed','red'); }
}

function render() {
  document.getElementById('s-total').textContent = products.length;
  document.getElementById('s-in').textContent = products.filter(p => p.status === 'in').length;
  document.getElementById('s-out').textContent = products.filter(p => p.status !== 'in').length;
  
  document.getElementById('items').innerHTML = products.map(p => `
    <div class="card">
      <div class="card-top">
        <div class="card-info">
          <div class="card-name">${p.name}</div>
          <div class="card-url">${p.url}</div>
        </div>
        <div class="badge ${p.status === 'in' ? 'badge-in' : 'badge-out'}">${p.status === 'in' ? 'IN STOCK' : 'OUT'}</div>
      </div>
      <div class="card-meta">
        <span style="font-size:12px;color:#777">Last: ${p.lastChecked ? new Date(p.lastChecked).toLocaleTimeString() : 'Pending'}</span>
        <button class="btn-del" style="height:30px;padding:0 10px;font-size:12px" onclick="removeProduct('${p.id}')">Remove</button>
      </div>
    </div>`).join('');
}

async function addProduct() {
  const name = document.getElementById('i-name').value;
  const url = document.getElementById('i-url').value;
  if(!url) return;
  const newP = { id: Date.now().toString(), name: name || 'Item', url };
  const newList = products.map(p => ({ id: p.id, name: p.name, url: p.url }));
  try {
    await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/products.json`, {
      method: 'PUT',
      body: JSON.stringify({ message: 'add item', content: btoa(JSON.stringify({products: [...newList, newP]}, null, 2)), sha: currentSha })
    });
    toast('Added!');
    setTimeout(loadProducts, 1500);
  } catch(e) { toast('Failed to add','red'); }
}

async function removeProduct(id) {
  const newList = products.filter(p => p.id !== id).map(p => ({ id: p.id, name: p.name, url: p.url }));
  try {
    await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/data/products.json`, {
      method: 'PUT',
      body: JSON.stringify({ message: 'remove item', content: btoa(JSON.stringify({products: newList}, null, 2)), sha: currentSha })
    });
    toast('Removed');
    setTimeout(loadProducts, 1500);
  } catch(e) { toast('Failed to remove','red'); }
}

function connect() {
  CFG = { owner: document.getElementById('s-owner').value, repo: document.getElementById('s-repo').value, token: document.getElementById('s-token').value };
  saveCfg();
  location.reload();
}

function signOut() { localStorage.removeItem(LS_KEY); location.reload(); }

function toast(m, c='') {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.color = c === 'red' ? '#f87171' : '#4ade80';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadCfg();
document.getElementById('loading').classList.add('hidden');
if(CFG.token) { document.getElementById('app').style.display='block'; loadProducts(); }
else { document.getElementById('setup-screen').style.display='flex'; }
</script>
</body>
</html>
