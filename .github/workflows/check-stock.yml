name: check-stock

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:      # Allows manual trigger from Dashboard

jobs:
  check-stock:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tracker
        run: node check.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit Results
        run: |
          git config user.name "StockBot"
          git config user.email "bot@stock"
          git add data/state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "update stock state" && git push)
