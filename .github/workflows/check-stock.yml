name: Stock Checker

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run stock check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node check.js

      - name: Commit updated state data
        run: |
          git config user.name  "Stock Tracker Bot"
          git config user.email "bot@stock-tracker"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: update stock state [skip ci]"
          git push
